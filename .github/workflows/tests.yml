name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore Implimentierung/Tests/LerngruppenkoordinatorTest.csproj

    - name: Build
      run: dotnet build Implimentierung/Tests/LerngruppenkoordinatorTest.csproj --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test Implimentierung/Tests/LerngruppenkoordinatorTest.csproj --no-build --configuration Release --verbosity normal
