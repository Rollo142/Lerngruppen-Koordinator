name: Unit Tests
on:
  push:
    branches: [ main ]
jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
    - name: Restore dependencies
      run: dotnet restore Implimentierung/Lerngruppenkoordinatorv2/LerngruppekoordinatorAufgabe2.slnx
    - name: Build
      run: dotnet build Implimentierung/Lerngruppenkoordinatorv2/LerngruppekoordinatorAufgabe2.slnx --no-restore
    - name: Test
      run: dotnet test Implimentierung/Lerngruppenkoordinatorv2/LerngruppekoordinatorAufgabe2.slnx --no-build --verbosity normal
